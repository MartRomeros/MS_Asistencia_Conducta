name: CI/CD MS_AUTH - Build, Push & Deploy

on:
  push:
    branches: [ master ]

env:
    DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
    IMAGE_NAME: ${{secrets.DOCKER_USERNAME}}/ms-asistencia

jobs:

    test:
      name: Run Tests
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup pnpm
          uses: pnpm/action-setup@v4
          with:
            version: latest

        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: '22'
            cache: 'pnpm'
        - name: Install dependencies
          run: pnpm install --frozen-lockfile
        - name: Run tests with coverage
          run: pnpm exec vitest run --coverage --coverage.reporter=html --coverage.reporter=text
        - name: Upload coverage report
          if: always()  # sube el reporte aunque fallen los tests
          uses: actions/upload-artifact@v4
          with:
            name: coverage-report
            path: coverage/
            retention-days: 7

    build_and_push:
        name: Build and Push Docker Image
        runs-on: ubuntu-latest
        needs: test

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ env.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build & push to dockerhub
              uses: docker/build-push-action@v5
              with:
                context: .
                file: ./Dockerfile
                push: true
                tags: |
                  ${{ env.IMAGE_NAME }}:latest
                  ${{ env.IMAGE_NAME }}:${{ github.sha }}
                cache-from: type=gha
                cache-to: type=gha,mode=max
